<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Council Admin | Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-base: #050505;
      --bg-surface: rgba(20, 20, 25, 0.6);
      --accent-cyan: #00f0ff;
      --accent-purple: #7000ff;
      --accent-red: #ff003c;
      --text-primary: #e2e8f0;
      --text-muted: #94a3b8;
      --border-glass: rgba(255, 255, 255, 0.1);
      --radius-sm: 4px;
      --radius-md: 8px;
    }

    * { box-sizing: border-box; }
    
    body { 
      margin: 0; background-color: var(--bg-base); color: var(--text-primary); 
      font-family: 'Inter', sans-serif; display: flex; flex-direction: column; height: 100vh;
      background-image: radial-gradient(circle at top right, rgba(0, 240, 255, 0.05), transparent 40%);
    }

    h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; color: #fff; margin-top: 0; }
    
    header {
      background: var(--bg-surface); padding: 15px 30px; 
      border-bottom: 1px solid var(--border-glass);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: space-between;
    }
    
    .logo-text { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.2rem; color: var(--accent-cyan); letter-spacing: 1px;}
    
    button {
      background: transparent; color: var(--accent-cyan);
      border: 1px solid var(--accent-cyan); border-radius: var(--radius-sm);
      padding: 8px 16px; font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 0.85rem;
      text-transform: uppercase; cursor: pointer; transition: all 0.2s ease;
    }
    button:hover { background: rgba(0, 240, 255, 0.1); box-shadow: 0 0 10px rgba(0, 240, 255, 0.3); }
    button.secondary { color: var(--text-primary); border-color: var(--border-glass); }
    button.secondary:hover { border-color: var(--text-primary); box-shadow: 0 0 8px rgba(255, 255, 255, 0.2); }
    button.danger { color: var(--accent-red); border-color: var(--accent-red); }
    button.danger:hover { background: rgba(255, 0, 60, 0.1); box-shadow: 0 0 10px rgba(255, 0, 60, 0.3); }

    main { padding: 40px; flex: 1; overflow-y: auto; max-width: 1000px; margin: 0 auto; width: 100%; }
    
    .request-card {
      background: var(--bg-surface); padding: 20px; border-radius: var(--radius-md); 
      border: 1px solid var(--border-glass); margin-bottom: 15px; 
      display: flex; justify-content: space-between; align-items: flex-start;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    
    .req-header { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; }
    .req-title { font-size: 1.2rem; margin: 0; text-transform: uppercase; }
    .req-meta { color: var(--text-muted); font-size: 0.85rem; font-family: 'JetBrains Mono', monospace; line-height: 1.5; }
    
    .badge {
      font-family: 'JetBrains Mono', monospace; padding: 4px 8px; font-size: 0.7rem; font-weight: 700;
      border-radius: var(--radius-sm); text-transform: uppercase; border: 1px solid;
    }
    .badge.pending { background: rgba(255, 255, 0, 0.05); color: #eab308; border-color: #ca8a04; }
    .badge.purple { background: rgba(112, 0, 255, 0.1); color: #b07cff; border-color: var(--accent-purple); }

    .actions { display: flex; gap: 10px; flex-direction: column; min-width: 180px; }
    .message-box { background: rgba(0,0,0,0.4); border: 1px solid var(--border-glass); border-radius: var(--radius-sm); padding: 15px; margin-top: 15px; font-family: 'Inter', sans-serif; font-size: 0.9rem; color: var(--text-primary); }
  </style>
</head>
<body>

  <header>
    <div class="logo-text">LTL AI COUNCIL | SYS.ADMIN</div>
    <div style="display: flex; gap: 10px;">
      <button class="secondary" onclick="loadInbox()">Refresh Stream</button>
      <button class="secondary" onclick="signOut()">Disconnect</button>
    </div>
  </header>

  <main>
    <h2 style="margin-bottom: 2rem;">Inbound Verification Queue</h2>
    <div id="inbox-container"><div style="font-family:'JetBrains Mono', monospace; color:var(--accent-cyan);">[ QUERYING DATABASE... ]</div></div>
  </main>

  <script>
    const SUPABASE_URL = 'https://wkedqgkucbrbsxbnrlgj.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_rJwyfnfLrrxlP0L3ftuubQ_5_Gf2jxh';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function checkAdmin() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) return window.location.replace('/index.html'); 

      const { data: profile } = await supabaseClient
        .from('profiles')
        .select('role')
        .eq('id', session.user.id)
        .single();

      if (!profile || profile.role !== 'admin') {
        document.body.innerHTML = '<h2 style="padding:40px; text-align:center; color: var(--accent-red); font-family:\'Space Grotesk\', sans-serif;">ERR: UNAUTHORIZED ACCESS</h2>';
        return;
      }
      loadInbox();
    }

    async function loadInbox() {
      const container = document.getElementById('inbox-container');
      
      const { data, error } = await supabaseClient
        .from('committee_requests')
        .select(`*, profiles ( full_name, email, pledge_version ), committees ( title )`)
        .eq('status', 'pending')
        .order('created_at', { ascending: false });

      if (error) { container.innerHTML = `<p style="color:var(--accent-red);">ERR: ${error.message}</p>`; return; }
      
      if (!data || data.length === 0) {
        container.innerHTML = '<p style="color: var(--text-muted); font-family:\'JetBrains Mono\', monospace;">[ QUEUE EMPTY ]</p>';
        return;
      }

      container.innerHTML = data.map(req => {
        const date = new Date(req.created_at).toLocaleDateString();
        const committeeName = req.committees?.title || 'NEW NODE DEPLOYMENT';
        const safeReqId = `'${req.id}'`;
        const safeProfileId = `'${req.profile_id}'`;

        return `
        <div class="request-card">
          <div style="flex: 1; padding-right: 30px;">
            <div class="req-header">
              <h3 class="req-title">${req.profiles.full_name}</h3>
              <span class="badge pending">Pending</span>
              <span class="badge purple">${req.request_type === 'lead_new' ? 'LEAD REQUEST' : 'JOIN REQUEST'}</span>
            </div>
            <div class="req-meta">
              ID: ${req.profiles.email}<br>
              TARGET: ${committeeName}<br>
              TS: ${date}<br>
              PLEDGE: <span style="color: var(--text-primary);">${req.profiles.pledge_version || 'NULL'}</span>
            </div>
            <div class="message-box">
              <strong style="color: var(--text-muted); font-size: 0.75rem; font-family:'JetBrains Mono', monospace; text-transform:uppercase;">Payload:</strong><br>
              ${req.message ? req.message.replace(/\\n/g, '<br>') : '<em>No payload attached.</em>'}
            </div>
          </div>
          <div class="actions">
            <button onclick="approveRequest(${safeReqId}, ${safeProfileId})">Authorize</button>
            <button class="danger" onclick="rejectRequest(${safeReqId})">Reject</button>
          </div>
        </div>`;
      }).join('');
    }

    async function approveRequest(requestId, profileId) {
      if (!confirm("Authorize network access for this entity?")) return;
      await supabaseClient.from('committee_requests').update({ status: 'approved' }).eq('id', requestId);
      await supabaseClient.from('profiles').update({ role: 'stakeholder', status: 'approved' }).eq('id', profileId);
      loadInbox();
    }

    async function rejectRequest(requestId) {
      const reason = prompt("Input rejection parameters (Reason Code):");
      if (reason === null) return;
      await supabaseClient.from('committee_requests').update({ status: 'rejected', reason_code: reason }).eq('id', requestId);
      loadInbox();
    }

    async function signOut() {
      await supabaseClient.auth.signOut();
      window.location.reload();
    }

    checkAdmin();
  </script>
</body>
</html>
